<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>🐸 Sound Leap</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: linear-gradient(145deg, #1d5e3f, #0f3e26);
      font-family: 'Segoe UI', 'Poppins', 'Comic Neue', system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .game-container {
      background: #2e7d4a;
      border-radius: 3rem;
      padding: 20px 18px 25px;
      box-shadow: 0 20px 30px rgba(0, 0, 0, 0.4), inset 0 1px 5px rgba(255, 255, 255, 0.2);
      border-bottom: 6px solid #1e582f;
    }

    .lake {
      background: radial-gradient(circle at 30% 30%, #4bb3df, #1f719b);
      border-radius: 2.5rem;
      padding: 20px 12px;
      box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.2), 0 8px 18px rgba(0, 0, 0, 0.3);
    }

    /* grid 5x6 - Slightly wider to accommodate larger text */
    .grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(85px, 105px));
      gap: 12px 10px;
      justify-content: center;
      padding: 8px;
      overflow-x: auto;
    }

    /* base pad style */
    .pad {
      background: radial-gradient(ellipse at 30% 35%, #7ed957, #3ea82b);
      border-radius: 50% 50% 45% 45% / 55% 55% 40% 40%;
      box-shadow: 0 8px 0 #1f651a, inset 0 2px 6px #e9ffbf;
      aspect-ratio: 1 / 0.95;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: bold;
      font-size: 0.85rem;
      padding: 10px 4px;
      cursor: pointer;
      transition: 0.07s linear;
      border: 2px solid #f9f2b0;
      color: #1d3c0a;
      position: relative;
    }

    /* ROCK START (#2d2c2c base) */
    .pad.rock-start {
      background: radial-gradient(ellipse at 30% 35%, #4a4848, #2d2c2c);
      box-shadow: 0 6px 0 #151414;
      border: 2px solid #655353;
    }
    
    /* ROCK START ACTIVE (#655353 border) */
    .pad.rock-start.frog-active {
      box-shadow: inset 0 0 0 3px #655353, 0 6px 0 #151414 !important;
      border: 2px solid #655353 !important;
      background: radial-gradient(ellipse at 30% 35%, #4a4848, #2d2c2c) !important;
    }

    /* Unified sunk/visited pad (blue) */
    .pad.sunk {
      background: radial-gradient(ellipse at 30% 35%, #4f8daa, #2c6079);
      box-shadow: inset 0 0 0 2px #b0e0ff, 0 4px 0 #1a455a;
      filter: grayscale(0.2);
      opacity: 0.85;
      cursor: default;
      border: 1px solid #9ac2d4;
    }
    .pad.sunk .word {
      background: rgba(0,0,0,0.5);
      color: #ffe0b3;
      /* Removed smaller font-size here so visited words stay large */
      font-weight: bold;
    }

    /* FINAL VICTORY PAD (#1f5f4a base, #a8d8a4 border) */
    .pad.victory-strong {
      background: radial-gradient(ellipse at 30% 35%, #2b8265, #1f5f4a) !important;
      box-shadow: 0 8px 0 #0e2e23, inset 0 0 0 4px #a8d8a4 !important;
      border: 2px solid #a8d8a4 !important;
      transform: scale(1.05);
      z-index: 5;
    }

    /* normal frog-active (non-rock) */
    .pad.frog-active:not(.rock-start) {
      background: radial-gradient(ellipse at 30% 35%, #baff8f, #5fcf3a);
      box-shadow: 0 5px 0 #1f651a, inset 0 0 0 3px #fffbc2;
    }

    .frog-icon {
      font-size: 2rem;
      filter: drop-shadow(2px 3px 2px rgba(0,0,0,0.3));
      margin-bottom: 4px;
    }

    .word {
      background: #fff1b5c9;
      border-radius: 40px;
      padding: 4px 8px;
      font-size: 0.95rem; /* Increased from 0.8rem */
      font-weight: 800;
      width: 90%;
      white-space: nowrap;
      overflow-x: hidden;
      text-overflow: ellipsis;
    }

    .rock-start .word {
      background: #ccc9a5;
      color: #2f2e1f;
    }

    /* control panel - simplified */
    .info-panel {
      margin-top: 20px;
      background: #eef5e4;
      border-radius: 60px;
      padding: 10px 18px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-weight: bold;
      box-shadow: inset 0 1px 5px #b7dc99, 0 5px 10px rgba(0,0,0,0.2);
    }

    /* DROPDOWN MENU STYLING */
    select.target-badge {
      background: #2b671f;
      border-radius: 40px;
      padding: 8px 35px 8px 18px;
      color: #ffefb0;
      font-size: 1.1rem;
      border: 2px solid #4a9e38;
      outline: none;
      cursor: pointer;
      font-family: inherit;
      font-weight: bold;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      /* custom SVG arrow for dropdown */
      background-image: url("data:image/svg+xml;utf8,<svg fill='%23ffefb0' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/><path d='M0 0h24v24H0z' fill='none'/></svg>");
      background-repeat: no-repeat;
      background-position-x: 96%;
      background-position-y: center;
      transition: background 0.1s;
    }
    
    select.target-badge:hover {
      background: #337a25;
    }

    select.target-badge option {
      background: #1d5e3f;
      color: #fff;
    }

    .current-word {
      background: #feffcf;
      border-radius: 60px;
      padding: 4px 18px;
      font-size: 1.2rem;
      flex-grow: 1;
      text-align: center;
    }

    .button-group {
      display: flex;
      gap: 10px;
    }

    .restart-btn {
      background: #ffb042;
      border: none;
      font-size: 1.7rem;
      font-weight: bold;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 4px 0 #a05e1a;
      transition: 0.05s linear;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .restart-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #a05e1a;
    }
    
    /* Slightly different color for mute button to distinguish it */
    .mute-btn {
      background: #4bb3df;
      box-shadow: 0 4px 0 #1a6f94;
    }
    .mute-btn:active {
      box-shadow: 0 1px 0 #1a6f94;
    }

    .message-area {
      background: #2a5522;
      border-radius: 2rem;
      padding: 8px 16px;
      color: #fcf5c6;
      text-align: center;
      font-size: 0.9rem;
      margin-top: 12px;
      transition: 0.1s;
    }
    footer {
      font-size: 0.7rem;
      text-align: center;
      color: #cef0bb;
      margin-top: 12px;
    }
    @media (max-width: 700px) {
      .grid {
        /* Slightly wider columns for mobile too */
        grid-template-columns: repeat(6, minmax(70px, 80px));
        gap: 8px;
      }
      .word {
        font-size: 0.75rem; /* Increased from 0.6rem */
        white-space: normal;
        word-break: break-word;
      }
      .frog-icon {
        font-size: 1.5rem;
      }
      .current-word {
        font-size: 0.9rem;
      }
      .restart-btn {
        width: 45px;
        height: 45px;
        font-size: 1.5rem;
      }
      select.target-badge {
        font-size: 0.95rem;
        padding-right: 30px;
      }
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="lake">
    <div class="grid" id="gridContainer"></div>

    <div class="info-panel">
      <select class="target-badge" id="soundSelector">
        <option value="ei">🎯 /eɪ/ as in "cake"</option>
        <option value="ou">🎯 /oʊ/ as in "boat"</option>
        <option value="oi">🎯 /ɔɪ/ as in "boy"</option>
        <option value="ai">🎯 /aɪ/ as in "eye"</option>
        <option value="aw">🎯 /aʊ/ as in "clown"</option>
      </select>

      <div class="current-word">
        🐸 ON: <span id="currentWordDisplay">—</span>
      </div>
      
      <div class="button-group">
        <button class="restart-btn mute-btn" id="muteBtn">🔊</button>
        <button class="restart-btn" id="restartBtn">♻️</button>
      </div>
    </div>
    <div class="message-area" id="gameMessage">
      ✨ Jump to ADJACENT lily pads (⬆️⬇️⬅️➡️). Jump only on words containing the <strong id="instructionPhoneme">/eɪ/</strong> sound.
    </div>
    <footer>
      💦 Correct lily pads turn BLUE after you leave. Wrong lily pads make the frog SINK → game over.
    </footer>
  </div>
</div>

<script>
  const ROWS = 5;
  const COLS = 6;

  // --- AUDIO SETUP ---
  const bgAudio = new Audio("https://raw.githubusercontent.com/notviniciuss-arch/frogpronunciation/8d8c4aa53d1a73fa0e3e3db04e18d2090fc11088/background-song.mp3");
  bgAudio.loop = true;
  bgAudio.volume = 0.3;

  const rightAudio = new Audio("https://raw.githubusercontent.com/notviniciuss-arch/frogpronunciation/d30d9b1b0e19911e13714c6706729d72c2a558d4/frog-right2.mp3");
  const wrongAudio = new Audio("https://raw.githubusercontent.com/notviniciuss-arch/frogpronunciation/8d8c4aa53d1a73fa0e3e3db04e18d2090fc11088/frog-wrong.mp3");
  const winAudio = new Audio("https://raw.githubusercontent.com/notviniciuss-arch/frogpronunciation/933cd636070cc9f71c0a0e2c8b02e9fa36a21384/frog-wins.mp3");

  let isMuted = false;
  let hasInteracted = false; 

  function playSound(audioEl) {
    if (!isMuted) {
      audioEl.currentTime = 0; 
      audioEl.play().catch(e => console.log("Audio play prevented:", e));
    }
  }

  document.body.addEventListener("click", () => {
    if (!hasInteracted && !isMuted) {
      bgAudio.play().catch(e => console.log("Autoplay prevented:", e));
      hasInteracted = true;
    }
  }, { once: true });

  const muteBtn = document.getElementById("muteBtn");
  muteBtn.addEventListener("click", (e) => {
    e.stopPropagation(); 
    isMuted = !isMuted;
    muteBtn.textContent = isMuted ? "🔇" : "🔊";
    
    if (isMuted) {
      bgAudio.pause();
    } else {
      bgAudio.play().catch(e => console.log("Autoplay prevented:", e));
      hasInteracted = true;
    }
  });


  // --- GAME DICTIONARY --- 
  const gameData = {
    "ei": {
      phoneme: "/eɪ/",
      words: [
        ["save", "pray", "said", "achieve", "might", "sight"],
        ["have", "angel", "dance", "medium", "either", "orient"],
        ["bike", "eight", "cake", "steak", "mean", "weird"],
        ["frost", "hand", "height", "make", "quiet", "seizure"],
        ["ice", "piece", "piece", "obey", "paper", "weight"]
      ],
      correct: [[0,0], [0,1], [1,1], [2,1], [2,2], [2,3], [3,3], [4,3], [4,4], [4,5]],
      start: [0,0],
      end: [4,5] // "weight"
    },
    "ou": {
      phoneme: "/oʊ/",
      words: [
        ["old", "ball", "our", "now", "color", "cocoa"],
        ["wholly", "drop", "vow", "yolk", "know", "studio"],
        ["grow", "who", "tough", "though", "south", "almost"],
        ["own", "how", "soap", "phobia", "doubt", "son"],
        ["load", "folk", "ocean", "pool", "dark", "lion"]
      ],
      correct: [[0,0], [1,0], [2,0], [3,0], [4,0], [4,1], [4,2], [3,2], [3,3], [2,3], [1,3], [1,4], [1,5], [0,5]],
      start: [0,0],
      end: [0,5] // "cocoa"
    },
    "oi": {
      phoneme: "/ɔɪ/",
      words: [
        ["join", "destroy", "toilet", "point", "polar", "turtle"],
        ["poll", "orange", "fold", "choice", "mouth", "snow"],
        ["tongue", "avoid", "boil", "alloy", "soap", "owl"],
        ["shop", "employ", "show", "flow", "notch", "fold"],
        ["bowl", "joy", "moist", "void", "poison", "voice"]
      ],
      correct: [[0,0], [0,1], [0,2], [0,3], [1,3], [2,1], [2,2], [2,3], [3,1], [4,1], [4,2], [4,3], [4,4], [4,5]],
      start: [0,0],
      end: [4,5] // "voice"
    },
    "ai": {
      phoneme: "/aɪ/",
      words: [
        ["fight", "stain", "frail", "friend", "veil", "aim"],
        ["vitamin", "chief", "triangle", "white", "alibi", "jail"],
        ["rhyme", "deck", "apply", "profit", "height", "archaic"],
        ["sight", "rivalry", "high", "saint", "kite", "license"],
        ["chain", "river", "vain", "remain", "braid", "key"]
      ],
      correct: [[0,0], [1,0], [2,0], [3,0], [3,1], [3,2], [2,2], [1,2], [1,3], [1,4], [2,4], [3,4], [3,5]],
      start: [0,0],
      end: [3,5] // "license"
    },
    "aw": {
      phoneme: "/aʊ/",
      words: [
        ["now", "august", "haunt", "bureau", "grown", "low"],
        ["about", "house", "loud", "almost", "crowd", "shout"],
        ["ball", "mother", "cloud", "vault", "cow", "could"],
        ["aura", "trauma", "drought", "down", "sour", "auto"],
        ["show", "know", "beauty", "bought", "color", "awful"]
      ],
      correct: [[0,0], [1,0], [1,1], [1,2], [2,2], [3,2], [3,3], [3,4], [2,4], [1,4], [1,5]],
      start: [0,0],
      end: [1,5] // "shout"
    }
  };

  // State Variables
  let RAW_WORDS, CORRECT_POSITIONS, START_ROW, START_COL, FINAL_ROW, FINAL_COL, PHONEME;
  let frogRow = 0, frogCol = 0;
  let gameActive = true;
  let victory = false;
  
  let sunkMap = [];
  let visitedMap = [];

  // DOM Elements
  const gridContainer = document.getElementById("gridContainer");
  const currentWordSpan = document.getElementById("currentWordDisplay");
  const messageDiv = document.getElementById("gameMessage");
  const restartBtn = document.getElementById("restartBtn");
  const soundSelector = document.getElementById("soundSelector");
  const instructionPhoneme = document.getElementById("instructionPhoneme");

  // Switch Levels 
  function loadLevel(levelKey) {
    const data = gameData[levelKey];
    RAW_WORDS = data.words;
    CORRECT_POSITIONS = data.correct;
    START_ROW = data.start[0];
    START_COL = data.start[1];
    FINAL_ROW = data.end[0];
    FINAL_COL = data.end[1];
    PHONEME = data.phoneme;
    
    instructionPhoneme.textContent = PHONEME;
    
    resetGame();
  }

  soundSelector.addEventListener("change", (e) => {
    loadLevel(e.target.value);
  });

  function isCorrectSound(row, col) {
    return CORRECT_POSITIONS.some(([r,c]) => r === row && c === col);
  }

  function setMessage(msg, isError = false, isGameOver = false) {
    messageDiv.innerHTML = msg;
    if (isGameOver) {
      messageDiv.style.background = "#5a2a2a";
      messageDiv.style.color = "#ffcf9f";
      messageDiv.style.border = "1px solid #ff8855";
    } else {
      messageDiv.style.background = isError ? "#863a2a" : "#2a5522";
      messageDiv.style.color = "#fff3cf";
      messageDiv.style.border = "none";
    }
  }

  function isAdjacent(row1, col1, row2, col2) {
    return (Math.abs(row1 - row2) + Math.abs(col1 - col2)) === 1;
  }

  function visitPad(row, col) {
    visitedMap[row][col] = true;
  }

  function winGame() {
    gameActive = false;
    victory = true;
    playSound(winAudio);
    setMessage("🏆 PERFECT JUMP! You've jumped on a solid lily pad. YOU WIN! 🏆");
    renderGrid();
  }

  function attemptMove(row, col) {
    if (!gameActive) {
      setMessage("Game over! Press ♻️ to try again.", true);
      return false;
    }
    if (victory) {
      setMessage("You already won! Press ♻️ to try again.");
      return false;
    }
    if (row === frogRow && col === frogCol) {
      setMessage("🐸 Frog is already here!", true);
      return false;
    }
    if (!isAdjacent(frogRow, frogCol, row, col)) {
      setMessage("❌ Frog can only jump to ADJACENT lily pads (up, down, left, right).", true);
      return false;
    }
    if (sunkMap[row][col] || visitedMap[row][col]) {
      setMessage("💀 You cannot jump to a lily pad you have already visited or that has sunk!", true);
      return false;
    }

    const isTargetCorrect = isCorrectSound(row, col);
    const isTargetFinal = (row === FINAL_ROW && col === FINAL_COL);

    // Turn previous pad visited before moving
    visitPad(frogRow, frogCol);

    if (isTargetFinal) {
      frogRow = row;
      frogCol = col;
      renderGrid();
      winGame();
      return true;
    }

    if (isTargetCorrect) {
      // Correct jump
      playSound(rightAudio);
      frogRow = row;
      frogCol = col;
      renderGrid();
      setMessage(`✅ Correct! "${RAW_WORDS[row][col]}" has the ${PHONEME} sound. Frog leaps safely.`);
    } else {
      // Wrong jump: The pad the frog lands on sinks
      playSound(wrongAudio);
      sunkMap[row][col] = true;
      gameActive = false;
      victory = false;
      renderGrid();
      setMessage(`💀 The frog stepped on "${RAW_WORDS[row][col]}" (wrong sound) and SANK! Press ♻️ to try again.`, true, true);
      return false;
    }
    return true;
  }

  function renderGrid() {
    gridContainer.innerHTML = "";
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const word = RAW_WORDS[r][c];
        
        const isFrogHere = ((gameActive || victory) && r === frogRow && c === frogCol);
        const isSunk = sunkMap[r][c];
        const isVisited = visitedMap[r][c];
        const isRockStart = (r === START_ROW && c === START_COL);
        const isFinalCell = (r === FINAL_ROW && c === FINAL_COL);
        
        const padDiv = document.createElement("div");
        padDiv.classList.add("pad");
        
        if (isRockStart) {
            padDiv.classList.add("rock-start");
        }
        
        if ((isSunk || isVisited) && !isRockStart) {
            padDiv.classList.add("sunk");
        }
        
        if (isFrogHere && !victory) padDiv.classList.add("frog-active");
        if (victory && isFinalCell && isFrogHere) padDiv.classList.add("victory-strong");
        
        const iconSpan = document.createElement("div");
        iconSpan.classList.add("frog-icon");
        if (isFrogHere) {
          iconSpan.textContent = "🐸";
        } else if (isRockStart && !isFrogHere) {
          iconSpan.textContent = "🪨"; 
        } else if (isSunk) { 
          iconSpan.textContent = "💦";
        } else {
          iconSpan.textContent = "🍃"; 
        }
        
        const wordSpan = document.createElement("div");
        wordSpan.classList.add("word");
        if (isSunk) {
          wordSpan.textContent = "💀 sunk";
        } else {
          wordSpan.textContent = word; 
        }
        
        padDiv.appendChild(iconSpan);
        padDiv.appendChild(wordSpan);
        
        if (gameActive && !victory && !sunkMap[r][c] && !visitedMap[r][c]) {
          padDiv.style.cursor = "pointer";
          padDiv.addEventListener("click", (function(row, col) {
            return function() { attemptMove(row, col); };
          })(r, c));
        } else {
          padDiv.style.cursor = "default";
        }
        
        gridContainer.appendChild(padDiv);
      }
    }
    
    // Dynamic text for UI
    const endWord = RAW_WORDS[FINAL_ROW][FINAL_COL];
    if (gameActive && !victory) {
      const currentWord = RAW_WORDS[frogRow][frogCol];
      if (frogRow === START_ROW && frogCol === START_COL) {
        currentWordSpan.innerHTML = `🪨 "${currentWord}"`;
      } else {
        currentWordSpan.innerHTML = `"${currentWord}"`;
      }
    } else if (victory) {
      currentWordSpan.innerHTML = `🏆 "${endWord}" 🏆`; 
    } else {
      currentWordSpan.innerHTML = `💀 GAME OVER`;
    }
  }
  
  function resetGame() {
    sunkMap = Array(ROWS).fill().map(() => Array(COLS).fill(false));
    visitedMap = Array(ROWS).fill().map(() => Array(COLS).fill(false));
    frogRow = START_ROW;
    frogCol = START_COL;
    gameActive = true;
    victory = false;
    renderGrid();
    
    // Dynamic instruction based on the map loaded
    setMessage(`🔄 Game restarted! Frog at the ROCK. Jump only on words containing the ${PHONEME} sound.`);
  }
  
  restartBtn.addEventListener("click", () => {
    resetGame();
  });
  
  // Initialize default level
  loadLevel(soundSelector.value);
</script>
</body>
</html>
